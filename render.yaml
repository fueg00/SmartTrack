services:
  # Backend API
  - type: web
    name: smarttrack-api
    healthCheckPath: /api/health
    env: node
    rootDir: backend
    plan: starter  
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://getsmarttrack.io
      - key: JWT_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PRO_PRICE_ID
        value: price_1TZfCj3BVkqzEwlbUsJ734nt
      - key: ENT_PRICE_ID
        value: price_1TYxSN3BVkqzEwlb3jEFIgHK

  # Frontend Static Site
  - type: web
    name: getsmarttrack-io
    env: static
    rootDir: frontend/dist
    publishDir: .
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smarttrack-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
